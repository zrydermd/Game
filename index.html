<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>Neon Pong</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    background: #0a0e1a;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #e8ecf5;
  }

  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: radial-gradient(ellipse at 50% 30%, #11182e 0%, #0a0e1a 70%);
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  #hud {
    width: 100%;
    max-width: 560px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px 10px;
    flex: 0 0 auto;
  }

  .hud-block { text-align: center; }
  .hud-label {
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #5a688a;
    margin-bottom: 2px;
  }
  .hud-value {
    font-size: 26px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #e8ecf5;
    text-shadow: 0 0 12px rgba(46, 230, 214, .35);
  }
  #highVal { color: #ffd166; text-shadow: 0 0 12px rgba(255, 209, 102, .35); }

  #stage {
    position: relative;
    flex: 1 1 auto;
    width: 100%;
    max-width: 560px;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 10px 16px;
  }

  #wrap {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(90, 120, 200, .22),
                0 0 28px rgba(46, 230, 214, .07),
                0 18px 50px rgba(0, 0, 0, .5);
  }

  canvas { display: block; background: #0c1222; }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(8, 11, 22, .82);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    text-align: center;
    padding: 24px;
    opacity: 1;
    transition: opacity .3s ease;
    z-index: 5;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }

  .title {
    font-size: clamp(34px, 9vw, 52px);
    font-weight: 800;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #2ee6d6 20%, #5c9dff 80%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 18px rgba(46, 230, 214, .45));
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 12px rgba(46,230,214,.35)); }
    50%      { filter: drop-shadow(0 0 26px rgba(46,230,214,.65)); }
  }

  .subtitle { font-size: 13px; color: #8a98b8; line-height: 1.7; }

  .btn {
    margin-top: 6px;
    padding: 15px 46px;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #041f24;
    background: linear-gradient(135deg, #2ee6d6, #5c9dff);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 22px rgba(46, 230, 214, .45), 0 4px 14px rgba(0,0,0,.4);
    transition: transform .12s ease, box-shadow .2s ease;
  }
  .btn:active {
    transform: scale(.95);
    box-shadow: 0 0 30px rgba(46, 230, 214, .7);
  }

  .final-score {
    font-size: 52px;
    font-weight: 800;
    color: #e8ecf5;
    text-shadow: 0 0 20px rgba(46, 230, 214, .5);
    line-height: 1;
  }
  .badge {
    display: none;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #ffd166;
    text-shadow: 0 0 14px rgba(255, 209, 102, .6);
    animation: pulse 1.6s ease-in-out infinite;
  }
  .badge.show { display: block; }

  #gameover .title {
    background: linear-gradient(135deg, #ff5c7a, #ff9e5c);
    -webkit-background-clip: text;
    background-clip: text;
    filter: drop-shadow(0 0 18px rgba(255, 92, 122, .45));
  }
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="hud-block">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="scoreVal">0</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">Best</div>
      <div class="hud-value" id="highVal">0</div>
    </div>
  </div>

  <div id="stage">
    <div id="wrap">
      <canvas id="game"></canvas>

      <div class="overlay" id="start">
        <div class="title">PONG</div>
        <div class="subtitle">Drag to move your paddle on mobile<br>Arrow keys / A-D or mouse on desktop<br>Beat the AI past its paddle to score</div>
        <button class="btn" id="playBtn">Tap to Play</button>
      </div>

      <div class="overlay hidden" id="gameover">
        <div class="title">GAME OVER</div>
        <div class="badge" id="newBest">★ New Best ★</div>
        <div class="final-score" id="finalScore">0</div>
        <div class="subtitle" id="bestLine">Best: 0</div>
        <button class="btn" id="restartBtn">Play Again</button>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  'use strict';

  const ASPECT = 17 / 24;          // width / height, portrait
  const BASE_BALL_SPEED = 0.62;    // field heights per second
  const MAX_BALL_SPEED = 1.7;
  const HIT_SPEEDUP = 1.045;       // per paddle hit
  const POINT_SPEEDUP = 0.03;      // base speed added per point won
  const PADDLE_W = 0.26;           // fraction of field width
  const PADDLE_H = 0.018;          // fraction of field height
  const BALL_R = 0.014;            // fraction of field height
  const AI_BASE_SPEED = 0.42;      // field widths per second
  const AI_SPEED_GAIN = 0.012;     // per point, AI gets slightly faster

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('scoreVal');
  const highEl = document.getElementById('highVal');
  const startOv = document.getElementById('start');
  const overOv = document.getElementById('gameover');
  const finalEl = document.getElementById('finalScore');
  const bestLine = document.getElementById('bestLine');
  const newBest = document.getElementById('newBest');

  let W = 300, H = 424, dpr = 1;   // CSS pixel size of the field

  function resize() {
    const stage = document.getElementById('stage');
    const availW = stage.clientWidth - 20;
    const availH = stage.clientHeight - 16;
    if (availW / availH > ASPECT) {
      H = Math.floor(availH);
      W = Math.floor(availH * ASPECT);
    } else {
      W = Math.floor(availW);
      H = Math.floor(availW / ASPECT);
    }
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 150));

  // ---- state ----
  // Positions are normalized: x in [0,1] of width, y in [0,1] of height.
  let ball, player, ai, score, high, alive, running;
  let lastTime, particles, trail, shake, serveTimer, beatRecord, prevHigh;
  let keyDir = 0;

  high = parseInt(localStorage.getItem('pongHighScore') || '0', 10) || 0;
  highEl.textContent = high;

  function reset() {
    player = { x: 0.5, y: 0.90 };
    ai = { x: 0.5, y: 0.06 };
    score = 0;
    alive = true;
    particles = [];
    trail = [];
    shake = 0;
    beatRecord = false;
    scoreEl.textContent = '0';
    serve();
  }

  function serve() {
    // launch from center toward the player at a gentle angle
    const angle = (Math.random() * 0.6 - 0.3) + Math.PI / 2;
    const speed = Math.min(MAX_BALL_SPEED, BASE_BALL_SPEED + score * POINT_SPEEDUP);
    ball = {
      x: 0.5, y: 0.5,
      vx: Math.cos(angle) * speed * ASPECT,
      vy: Math.sin(angle) * speed,
      speed
    };
    serveTimer = 0.7;  // brief pause before the ball moves
    trail = [];
  }

  // ---- input ----
  function movePlayerTo(clientX) {
    const rect = canvas.getBoundingClientRect();
    const nx = (clientX - rect.left) / rect.width;
    player.x = Math.min(1 - PADDLE_W / 2, Math.max(PADDLE_W / 2, nx));
  }

  document.addEventListener('touchstart', e => {
    if (running) movePlayerTo(e.changedTouches[0].clientX);
  }, {passive: false});
  document.addEventListener('touchmove', e => {
    e.preventDefault(); // block scroll / pull-to-refresh
    if (running) movePlayerTo(e.changedTouches[0].clientX);
  }, {passive: false});

  canvas.addEventListener('mousemove', e => {
    if (running) movePlayerTo(e.clientX);
  });

  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
      e.preventDefault(); keyDir = -1;
    } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
      e.preventDefault(); keyDir = 1;
    } else if (e.key === ' ' || e.key === 'Enter') {
      if (!startOv.classList.contains('hidden') || !overOv.classList.contains('hidden')) startGame();
    }
  }, {passive: false});
  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') { if (keyDir < 0) keyDir = 0; }
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { if (keyDir > 0) keyDir = 0; }
  });

  // block double-tap zoom & gesture zoom
  document.addEventListener('dblclick', e => e.preventDefault(), {passive: false});
  document.addEventListener('gesturestart', e => e.preventDefault());

  // ---- game logic ----
  function paddleBounce(paddle, towardY) {
    // bounce angle depends on where the ball struck the paddle
    const off = Math.max(-1, Math.min(1, (ball.x - paddle.x) / (PADDLE_W / 2)));
    const maxAngle = 1.05; // ~60 degrees from vertical
    const a = off * maxAngle;
    ball.speed = Math.min(MAX_BALL_SPEED, ball.speed * HIT_SPEEDUP);
    ball.vx = Math.sin(a) * ball.speed * ASPECT;
    ball.vy = Math.cos(a) * ball.speed * towardY;
    spawnParticles(ball.x, ball.y, '#2ee6d6', 8);
    shake = 0.35;
  }

  function update(dt) {
    // player keyboard movement
    if (keyDir !== 0) {
      player.x += keyDir * 1.1 * dt;
      player.x = Math.min(1 - PADDLE_W / 2, Math.max(PADDLE_W / 2, player.x));
    }

    // AI tracks the ball, capped speed so it can be beaten
    const aiSpeed = AI_BASE_SPEED + score * AI_SPEED_GAIN;
    const dx = ball.x - ai.x;
    const step = aiSpeed * dt;
    ai.x += Math.abs(dx) < step ? dx : Math.sign(dx) * step;
    ai.x = Math.min(1 - PADDLE_W / 2, Math.max(PADDLE_W / 2, ai.x));

    if (serveTimer > 0) { serveTimer -= dt; return; }

    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;
    trail.push({x: ball.x, y: ball.y, life: 1});
    if (trail.length > 22) trail.shift();

    const rX = BALL_R / ASPECT; // ball radius in width units

    // side walls
    if (ball.x < rX) { ball.x = rX; ball.vx = Math.abs(ball.vx); spawnParticles(ball.x, ball.y, '#5c9dff', 4); }
    if (ball.x > 1 - rX) { ball.x = 1 - rX; ball.vx = -Math.abs(ball.vx); spawnParticles(ball.x, ball.y, '#5c9dff', 4); }

    // player paddle (bottom), only when moving down
    if (ball.vy > 0 &&
        ball.y + BALL_R >= player.y - PADDLE_H / 2 &&
        ball.y - BALL_R <= player.y + PADDLE_H / 2 &&
        Math.abs(ball.x - player.x) <= PADDLE_W / 2 + rX) {
      ball.y = player.y - PADDLE_H / 2 - BALL_R;
      paddleBounce(player, -1);
    }

    // AI paddle (top), only when moving up
    if (ball.vy < 0 &&
        ball.y - BALL_R <= ai.y + PADDLE_H / 2 &&
        ball.y + BALL_R >= ai.y - PADDLE_H / 2 &&
        Math.abs(ball.x - ai.x) <= PADDLE_W / 2 + rX) {
      ball.y = ai.y + PADDLE_H / 2 + BALL_R;
      paddleBounce(ai, 1);
    }

    // ball past AI: player scores
    if (ball.y < -0.05) {
      score++;
      scoreEl.textContent = score;
      spawnParticles(ball.x, 0.02, '#ffd166', 16);
      if (navigator.vibrate) navigator.vibrate(25);
      if (score > prevHigh) beatRecord = true;
      if (score > high) {
        high = score;
        highEl.textContent = high;
        localStorage.setItem('pongHighScore', String(high));
      }
      serve();
    }

    // ball past player: game over
    if (ball.y > 1.05) die();
  }

  function die() {
    alive = false;
    if (navigator.vibrate) navigator.vibrate(80);
    spawnParticles(ball.x, 0.98, '#ff5c7a', 24);
    shake = 0.8;
    setTimeout(showGameOver, 650);
  }

  function showGameOver() {
    running = false;
    finalEl.textContent = score;
    bestLine.textContent = 'Best: ' + high;
    newBest.classList.toggle('show', beatRecord);
    overOv.classList.remove('hidden');
  }

  function spawnParticles(nx, ny, color, n = 10) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const v = 40 + Math.random() * 110;
      particles.push({
        x: nx * W, y: ny * H,
        vx: Math.cos(a) * v, vy: Math.sin(a) * v,
        life: 1, color
      });
    }
  }

  // ---- rendering ----
  function drawPaddle(p, color) {
    const pw = PADDLE_W * W, ph = Math.max(6, PADDLE_H * H);
    const x = p.x * W - pw / 2, y = p.y * H - ph / 2;
    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = 18;
    const g = ctx.createLinearGradient(x, y, x + pw, y);
    g.addColorStop(0, color);
    g.addColorStop(0.5, '#e8fcff');
    g.addColorStop(1, color);
    ctx.fillStyle = g;
    roundRect(x, y, pw, ph, ph / 2);
    ctx.fill();
    ctx.restore();
  }

  function draw(now) {
    ctx.clearRect(0, 0, W, H);

    ctx.save();
    if (shake > 0) {
      ctx.translate((Math.random() - 0.5) * shake * 8, (Math.random() - 0.5) * shake * 8);
    }

    // background + subtle grid
    ctx.fillStyle = '#0c1222';
    ctx.fillRect(-10, -10, W + 20, H + 20);
    ctx.strokeStyle = 'rgba(90, 120, 200, 0.07)';
    ctx.lineWidth = 1;
    const cellPx = W / 12;
    ctx.beginPath();
    for (let x = cellPx; x < W; x += cellPx) { ctx.moveTo(x + .5, 0); ctx.lineTo(x + .5, H); }
    for (let y = cellPx; y < H; y += cellPx) { ctx.moveTo(0, y + .5); ctx.lineTo(W, y + .5); }
    ctx.stroke();

    // center line
    ctx.strokeStyle = 'rgba(120, 150, 220, 0.18)';
    ctx.lineWidth = 2;
    ctx.setLineDash([10, 12]);
    ctx.beginPath();
    ctx.moveTo(0, H / 2);
    ctx.lineTo(W, H / 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // ball trail
    for (let i = 0; i < trail.length; i++) {
      const t = trail[i];
      const a = (i / trail.length) * 0.35;
      ctx.fillStyle = 'rgba(46, 230, 214, ' + a + ')';
      ctx.beginPath();
      ctx.arc(t.x * W, t.y * H, BALL_R * H * (0.3 + 0.7 * i / trail.length), 0, Math.PI * 2);
      ctx.fill();
    }

    // ball (with serve pulse)
    if (alive) {
      const r = BALL_R * H * (serveTimer > 0 ? 1 + 0.3 * Math.sin(now / 90) : 1);
      ctx.save();
      ctx.shadowColor = '#2ee6d6';
      ctx.shadowBlur = 22;
      ctx.fillStyle = '#d8fffb';
      ctx.beginPath();
      ctx.arc(ball.x * W, ball.y * H, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    drawPaddle(ai, '#ff9e5c');
    drawPaddle(player, '#2ee6d6');

    // particles
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2.4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ---- main loop ----
  function loop(now) {
    if (!running) return;
    const dt = Math.min(0.033, (now - lastTime) / 1000);
    lastTime = now;

    if (alive) update(dt);

    shake = Math.max(0, shake - dt * 2.5);
    for (const p of particles) {
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 220 * dt;
      p.life -= dt * 1.8;
    }
    particles = particles.filter(p => p.life > 0);

    draw(now);
    requestAnimationFrame(loop);
  }

  function startGame() {
    prevHigh = high;
    reset();
    startOv.classList.add('hidden');
    overOv.classList.add('hidden');
    running = true;
    lastTime = performance.now();
    requestAnimationFrame(loop);
  }

  document.getElementById('playBtn').addEventListener('click', startGame);
  document.getElementById('restartBtn').addEventListener('click', startGame);

  // initial render behind start screen
  resize();
  reset();
  alive = true;
  draw(performance.now());
})();
</script>
</body>
</html>
