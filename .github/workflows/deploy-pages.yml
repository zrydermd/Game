name: Deploy to GitHub Pages

# Publishes the repo root to the gh-pages branch. GitHub auto-enables
# Pages from gh-pages, which the default GITHUB_TOKEN cannot do via the
# newer actions/configure-pages flow (it requires admin permissions).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
